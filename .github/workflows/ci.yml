name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  daml-ci:
    name: Daml Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Daml SDK
        run: |
          curl -sSL https://get.daml.com/ | sh -s 3.1.0
          echo "$HOME/.daml/bin" >> $GITHUB_PATH

      - name: Verify Daml version
        run: daml --version

      - name: Build Daml project
        run: daml build

      - name: Test Daml contracts
        run: daml test

  frontend-ci:
    name: TypeScript Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Lint code
        run: npm run lint

      - name: Build frontend application
        run: npm run build